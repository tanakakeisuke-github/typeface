<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch Type</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;width:100vw;height:100vh;cursor:text}
canvas{position:fixed;top:0;left:0}
#bg{z-index:0}#dots{z-index:2}
#static{z-index:8;pointer-events:none;opacity:0.03}
.scan{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}
.btns{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:8px}
.btn{background:none;border:1px solid #333;color:#555;font:10px/1 'Courier New',monospace;
  letter-spacing:0.18em;text-transform:uppercase;padding:6px 18px;cursor:pointer;transition:all .3s}
.btn:hover{border-color:#888;color:#aaa}
.btn.on{border-color:#fff;color:#fff}
#dbg{position:fixed;top:8px;left:8px;color:#555;font:10px/1.4 'Courier New',monospace;z-index:30;pointer-events:none}
#counter{position:fixed;top:8px;right:12px;color:#333;font:10px/1 'Courier New',monospace;z-index:30;pointer-events:none}
#musicInfo{position:fixed;top:28px;left:8px;color:#999;font:10px/1.4 'Courier New',monospace;z-index:30;pointer-events:none;opacity:0;transition:opacity .5s}
#musicInfo.show{opacity:1}
#musicProgress{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);width:200px;height:2px;background:#1a1a1a;z-index:20;cursor:pointer;display:none}
#musicProgress .bar{height:100%;background:#fff;width:0%;transition:none}

#devPanel{position:fixed;top:8px;right:8px;z-index:50;background:rgba(10,10,10,0.92);border:1px solid #333;padding:12px 16px;font:10px/1.6 'Courier New',monospace;color:#666;width:220px;max-height:90vh;overflow-y:auto;display:none;pointer-events:auto}
#devPanel.show{display:block}
#devPanel h3{color:#888;font-size:10px;margin:0 0 8px;letter-spacing:0.15em;text-transform:uppercase;border-bottom:1px solid #222;padding-bottom:4px}
#devPanel label{display:flex;justify-content:space-between;align-items:center;margin:3px 0;color:#555}
#devPanel label span{min-width:60px}
#devPanel input[type=range]{width:90px;height:2px;-webkit-appearance:none;background:#333;outline:none;cursor:pointer}
#devPanel input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;background:#888;border-radius:50%;cursor:pointer}
#devPanel .val{color:#888;min-width:30px;text-align:right;font-variant-numeric:tabular-nums}
#devPanel .section{margin-top:8px;padding-top:6px;border-top:1px solid #1a1a1a}

</style>
</head>
<body>
<canvas id="bg"></canvas><canvas id="dots"></canvas><canvas id="static"></canvas>
<div class="scan"></div>
<div class="btns">
  <button class="btn" id="autoBtn">auto: off</button>
  <button class="btn on" id="soundBtn">sound: on</button>
  <button class="btn" id="musicBtn">music: off</button>
  <button class="btn" id="clearBtn">clear</button>
</div>
<div id="musicProgress"><div class="bar"></div></div>
<input type="file" id="musicFile" accept="audio/*" style="display:none">

<button class="btn" id="devBtn" style="position:fixed;top:8px;right:8px;z-index:51;padding:4px 10px">dev</button>
<div id="devPanel">
<h3>dev controls</h3>
<label><span>wave</span><input type="range" id="s_wave" min="0" max="200" value="100"><span class="val" id="v_wave">1.0</span></label>
<label><span>pulse</span><input type="range" id="s_pulse" min="0" max="200" value="100"><span class="val" id="v_pulse">1.0</span></label>
<label><span>scatter</span><input type="range" id="s_scatter" min="0" max="200" value="100"><span class="val" id="v_scatter">1.0</span></label>
<label><span>beat pow</span><input type="range" id="s_beatpow" min="0" max="200" value="100"><span class="val" id="v_beatpow">1.0</span></label>
<label><span>beat sens</span><input type="range" id="s_beatsens" min="10" max="200" value="100"><span class="val" id="v_beatsens">1.0</span></label>
<div class="section"></div>
<label><span>corrupt</span><input type="range" id="s_corrupt" min="0" max="200" value="100"><span class="val" id="v_corrupt">1.0</span></label>
<label><span>spring</span><input type="range" id="s_spring" min="10" max="300" value="100"><span class="val" id="v_spring">1.0</span></label>
<label><span>size</span><input type="range" id="s_size" min="0" max="200" value="100"><span class="val" id="v_size">1.0</span></label>
<div class="section"></div>
<label><span>bright</span><input type="range" id="s_bright" min="0" max="200" value="100"><span class="val" id="v_bright">1.0</span></label>
<label><span>flash</span><input type="range" id="s_flash" min="0" max="200" value="100"><span class="val" id="v_flash">1.0</span></label>
<label><span>glitch</span><input type="range" id="s_glitch" min="0" max="200" value="100"><span class="val" id="v_glitch">1.0</span></label>
<label><span>row shift</span><input type="range" id="s_row" min="0" max="200" value="100"><span class="val" id="v_row">1.0</span></label>
<label><span>noise</span><input type="range" id="s_noise" min="0" max="200" value="100"><span class="val" id="v_noise">1.0</span></label>
</div>

<div id="dbg">type to write</div>
<div id="counter">0/48</div>
<div id="musicInfo"></div>
<script>
var MAX_CHARS=48;
var currentText='A';
var cursorVisible=true;
var cursorTimer=0;

// ===== AUDIO =====
var actx=null,soundOn=true,audioOk=false;
var noiseGain,noiseFilt,droneGain,droneFilt,drone1,drone2;
var glitchOsc,glitchGain,crackBuf,prevInt=0,gbt=0;

// ===== MUSIC REACTIVE =====
var musicOn=false,musicPlaying=false;
var musicSource=null,musicAnalyser=null,musicGain=null;
var musicBuffer=null,musicStartTime=0,musicPauseOffset=0;
var musicFreqData=null,musicTimeData=null;
var musicBass=0,musicMid=0,musicHigh=0,musicEnergy=0;
var musicBeat=false,musicBeatThreshold=0.35,musicBeatDecay=0;
var musicPrevEnergy=0,musicEnergyHistory=[];
var musicFileName='';
// ===== DEV PANEL =====
var D={wave:1,pulse:1,scatter:1,beatpow:1,beatsens:1,corrupt:1,spring:1,size:1,bright:1,flash:1,glitch:1,row:1,noise:1};


function tryInitAudio(){
if(audioOk){if(actx&&actx.state==='suspended')actx.resume();return;}
try{
var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
actx=new AC();if(actx.state==='suspended')actx.resume();
var master=actx.createGain();master.gain.value=0.4;master.connect(actx.destination);
var sr=actx.sampleRate;
var nLen=sr*4,nBuf=actx.createBuffer(1,nLen,sr),nD=nBuf.getChannelData(0);
for(var i=0;i<nLen;i++)nD[i]=Math.random()*2-1;
var nSrc=actx.createBufferSource();nSrc.buffer=nBuf;nSrc.loop=true;
noiseFilt=actx.createBiquadFilter();noiseFilt.type='bandpass';noiseFilt.frequency.value=400;noiseFilt.Q.value=1.5;
noiseGain=actx.createGain();noiseGain.gain.value=0;
nSrc.connect(noiseFilt);noiseFilt.connect(noiseGain);noiseGain.connect(master);nSrc.start(0);
drone1=actx.createOscillator();drone1.type='sawtooth';drone1.frequency.value=55;
drone2=actx.createOscillator();drone2.type='sawtooth';drone2.frequency.value=55.5;
droneFilt=actx.createBiquadFilter();droneFilt.type='lowpass';droneFilt.frequency.value=200;droneFilt.Q.value=2;
droneGain=actx.createGain();droneGain.gain.value=0;
drone1.connect(droneFilt);drone2.connect(droneFilt);droneFilt.connect(droneGain);droneGain.connect(master);
drone1.start(0);drone2.start(0);
glitchOsc=actx.createOscillator();glitchOsc.type='square';glitchOsc.frequency.value=220;
glitchGain=actx.createGain();glitchGain.gain.value=0;
glitchOsc.connect(glitchGain);glitchGain.connect(master);glitchOsc.start(0);
var cLen=Math.floor(sr*0.04),cBuf=actx.createBuffer(1,cLen,sr),cD=cBuf.getChannelData(0);
for(var i=0;i<cLen;i++)cD[i]=(Math.random()*2-1)*Math.exp(-i/(cLen*0.12));
crackBuf=cBuf;
audioOk=true;
}catch(e){}
}
document.addEventListener('mousedown',tryInitAudio);
document.addEventListener('touchstart',tryInitAudio,{passive:true});
document.addEventListener('click',tryInitAudio);
document.addEventListener('keydown',tryInitAudio);

function playCrackle(vol){
if(!audioOk||!soundOn)return;
try{var src=actx.createBufferSource();src.buffer=crackBuf;
var g=actx.createGain();g.gain.value=Math.min(vol,0.25);
src.connect(g);g.connect(actx.destination);src.start(0);}catch(e){}
}
function playTypeSound(ch){
if(!audioOk||!soundOn)return;
try{var t=actx.currentTime,code=ch.toUpperCase().charCodeAt(0);
var freq=100+(code%32)*30+Math.random()*20;
var o=actx.createOscillator();o.type=Math.random()>0.5?'sawtooth':'square';o.frequency.value=freq;
var g=actx.createGain();g.gain.setValueAtTime(0.12,t);g.gain.linearRampToValueAtTime(0,t+0.08);
o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+0.1);
playCrackle(0.15);
}catch(e){}
}
function playDeleteSound(){
if(!audioOk||!soundOn)return;
try{var t=actx.currentTime;
var o=actx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(60,t+0.1);
var g=actx.createGain();g.gain.setValueAtTime(0.1,t);g.gain.linearRampToValueAtTime(0,t+0.1);
o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+0.12);
}catch(e){}
}
function updateSound(int){
if(!audioOk||!soundOn)return;
try{var t=actx.currentTime;
noiseGain.gain.linearRampToValueAtTime(int*0.15,t+0.05);
noiseFilt.frequency.linearRampToValueAtTime(200+int*3000,t+0.05);
droneGain.gain.linearRampToValueAtTime(Math.max(0,int*0.1-0.005),t+0.08);
droneFilt.frequency.linearRampToValueAtTime(100+int*1200,t+0.1);
drone2.frequency.linearRampToValueAtTime(55.5+int*5,t+0.1);
gbt--;
if(int>0.2&&gbt<=0&&Math.random()<int*0.15){
var fqs=[55,110,220,330,440,660,880];
glitchOsc.frequency.setValueAtTime(fqs[(Math.random()*fqs.length)|0],t);
glitchGain.gain.setValueAtTime(int*0.08,t);
glitchGain.gain.linearRampToValueAtTime(0,t+0.02+Math.random()*0.05);
gbt=Math.floor(3+Math.random()*8*(1-int));
}
var delta=Math.abs(int-prevInt);
if(delta>0.015)playCrackle(delta*2);
prevInt=int;
}catch(e){}
}
function muteAll(){
if(!audioOk)return;
try{var t=actx.currentTime;noiseGain.gain.linearRampToValueAtTime(0,t+0.1);
droneGain.gain.linearRampToValueAtTime(0,t+0.1);glitchGain.gain.linearRampToValueAtTime(0,t+0.05);}catch(e){}
}

// ===== MUSIC REACTIVE SYSTEM =====
var musicInfoEl=document.getElementById('musicInfo');
var musicProgressEl=document.getElementById('musicProgress');
var musicBarEl=musicProgressEl.querySelector('.bar');
var musicFileEl=document.getElementById('musicFile');
var musicBtnEl=document.getElementById('musicBtn');

function loadMusicFile(file){
tryInitAudio();
if(!audioOk)return;
musicFileName=file.name;
var reader=new FileReader();
reader.onload=function(e){
actx.decodeAudioData(e.target.result,function(buffer){
musicBuffer=buffer;
musicInfoEl.textContent='loaded: '+musicFileName;
musicInfoEl.classList.add('show');
startMusicPlayback();
},function(err){
musicInfoEl.textContent='decode error';
musicInfoEl.classList.add('show');
});
};
reader.readAsArrayBuffer(file);
}

function startMusicPlayback(){
if(!musicBuffer||!audioOk)return;
stopMusicPlayback();
musicSource=actx.createBufferSource();
musicSource.buffer=musicBuffer;
musicAnalyser=actx.createAnalyser();
musicAnalyser.fftSize=1024;
musicAnalyser.smoothingTimeConstant=0.8;
musicGain=actx.createGain();
musicGain.gain.value=0.7;
musicSource.connect(musicAnalyser);
musicAnalyser.connect(musicGain);
musicGain.connect(actx.destination);
musicFreqData=new Uint8Array(musicAnalyser.frequencyBinCount);
musicTimeData=new Uint8Array(musicAnalyser.frequencyBinCount);
musicSource.start(0,musicPauseOffset);
musicStartTime=actx.currentTime-musicPauseOffset;
musicPlaying=true;
musicOn=true;
musicBtnEl.textContent='music: on';
musicBtnEl.classList.add('on');
musicProgressEl.style.display='block';
musicSource.onended=function(){
musicPlaying=false;
musicPauseOffset=0;
musicBtnEl.textContent='music: off';
musicBtnEl.classList.remove('on');
musicProgressEl.style.display='none';
musicInfoEl.textContent='ended: '+musicFileName;
};
}

function stopMusicPlayback(){
if(musicSource){
try{musicSource.onended=null;musicSource.stop();}catch(e){}
musicSource=null;
}
musicPlaying=false;
}

function toggleMusic(){
if(!musicBuffer){
musicFileEl.click();
return;
}
if(musicPlaying){
musicPauseOffset=actx.currentTime-musicStartTime;
stopMusicPlayback();
musicBtnEl.textContent='music: off';
musicBtnEl.classList.remove('on');
}else{
startMusicPlayback();
}
}

function analyzeMusicData(){
if(!musicPlaying||!musicAnalyser)return;
musicAnalyser.getByteFrequencyData(musicFreqData);
musicAnalyser.getByteTimeDomainData(musicTimeData);
var len=musicFreqData.length;
var bassEnd=Math.floor(len*0.1);
var midEnd=Math.floor(len*0.4);
var bassSum=0,midSum=0,highSum=0,totalSum=0;
for(var i=0;i<len;i++){
var v=musicFreqData[i]/255;
totalSum+=v;
if(i<bassEnd)bassSum+=v;
else if(i<midEnd)midSum+=v;
else highSum+=v;
}
musicBass=bassSum/bassEnd;
musicMid=midSum/(midEnd-bassEnd);
musicHigh=highSum/(len-midEnd);
musicEnergy=totalSum/len;
musicEnergyHistory.push(musicEnergy);
if(musicEnergyHistory.length>30)musicEnergyHistory.shift();
var avgE=0;
for(var i=0;i<musicEnergyHistory.length;i++)avgE+=musicEnergyHistory[i];
avgE/=musicEnergyHistory.length;
musicBeat=musicEnergy>avgE*(1.2/D.beatsens)&&musicBass>(0.3/D.beatsens)&&musicBeatDecay<=0;
if(musicBeat)musicBeatDecay=4;
if(musicBeatDecay>0)musicBeatDecay--;
if(musicBuffer){
var elapsed=actx.currentTime-musicStartTime;
var pct=Math.min(100,(elapsed/musicBuffer.duration)*100);
musicBarEl.style.width=pct+'%';
}
}

musicFileEl.addEventListener('change',function(e){
if(e.target.files&&e.target.files[0]){
loadMusicFile(e.target.files[0]);
}
});
musicBtnEl.addEventListener('click',toggleMusic);
musicProgressEl.addEventListener('click',function(e){
if(!musicBuffer)return;
var rect=musicProgressEl.getBoundingClientRect();
var pct=(e.clientX-rect.left)/rect.width;
musicPauseOffset=pct*musicBuffer.duration;
if(musicPlaying){
stopMusicPlayback();
startMusicPlayback();
}
});

// ===== VISUALS =====
var bgC=document.getElementById('bg'),dotC=document.getElementById('dots'),stC=document.getElementById('static');
var bgX=bgC.getContext('2d'),dotX=dotC.getContext('2d'),stX=stC.getContext('2d');
var offC=document.createElement('canvas'),offX=offC.getContext('2d');
var W=100,H=100;
var FSERIF=['Georgia','Times New Roman','Palatino','Garamond'];
var FSANS=['Helvetica','Arial','Futura','Gill Sans'];
var BR=1.8,TP=Math.PI*2;
var mx=0,my=0,isDown=false,intensity=0,targetInt=0,frame=0,serifW=0.5;
var particles=[],curFont='Georgia';
var autoMode=false,autoPhase=0,autoWX=0,autoWY=0,autoBT=0,autoIT=0;
var counterEl=document.getElementById('counter');
var dbgEl=document.getElementById('dbg');

document.getElementById('autoBtn').addEventListener('click',function(){
autoMode=!autoMode;this.textContent=autoMode?'auto: on':'auto: off';
if(autoMode)this.classList.add('on');else this.classList.remove('on');
});
document.getElementById('soundBtn').addEventListener('click',function(){
soundOn=!soundOn;this.textContent=soundOn?'sound: on':'sound: off';
if(soundOn)this.classList.add('on');else{this.classList.remove('on');muteAll();}
});
document.getElementById('clearBtn').addEventListener('click',function(){
currentText='';targetInt=0.6;sampleText();updateCounter();
});


document.getElementById('devBtn').addEventListener('click',function(e){
e.stopPropagation();
var p=document.getElementById('devPanel');
p.classList.toggle('show');
if(p.classList.contains('show'))this.classList.add('on');else this.classList.remove('on');
});
document.getElementById('devPanel').addEventListener('mousedown',function(e){e.stopPropagation();});
document.getElementById('devPanel').addEventListener('keydown',function(e){e.stopPropagation();});
(function(){
var ids=['wave','pulse','scatter','beatpow','beatsens','corrupt','spring','size','bright','flash','glitch','row','noise'];
ids.forEach(function(id){
var sl=document.getElementById('s_'+id),vl=document.getElementById('v_'+id);
sl.addEventListener('input',function(){D[id]=parseFloat(sl.value)/100;vl.textContent=D[id].toFixed(1);});
});
})();

function updateCounter(){
counterEl.textContent=currentText.length+'/'+MAX_CHARS;
}

// ===== KEY INPUT =====
addEventListener('keydown',function(e){
if(e.metaKey||e.ctrlKey)return;
var k=e.key;
if(k==='Backspace'){
e.preventDefault();
if(currentText.length>0){
currentText=currentText.slice(0,-1);
targetInt=Math.min(1,intensity+0.2);
playDeleteSound();
sampleText();updateCounter();
}
return;
}
if(k==='Enter')return;
if(k.length===1&&currentText.length<MAX_CHARS){
var upper=k.toUpperCase();
if((upper>='A'&&upper<='Z')||k===' '){
e.preventDefault();
currentText+=upper;
targetInt=Math.min(1,intensity+0.3);
if(k!==' ')playTypeSound(upper);
else playCrackle(0.1);
sampleText();updateCounter();
if(dbgEl.style.opacity!=='0'){dbgEl.style.opacity='0';}
}
}
});

function Dot(x,y,b){this.hx=x;this.hy=y;this.x=x;this.y=y;this.b=b;this.vx=0;this.vy=0;this.r=BR;this.ph=Math.random()*TP;this.corrupt=false;this.ct=0;this.dead=Math.random()<0.002;this.stuck=Math.random()<0.008?(Math.random()-0.5)*6:0;this.bs=0.01+Math.random()*0.02;}
Dot.prototype.update=function(int,fr){
if(isDown&&!autoMode){var dx=this.x-mx,dy=this.y-my,dist=Math.sqrt(dx*dx+dy*dy),rad=100+int*200;
if(dist<rad){var f=(1-dist/rad)*int*12,a=Math.atan2(dy,dx)+(Math.random()-0.5)*int*2;this.vx+=Math.cos(a)*f;this.vy+=Math.sin(a)*f;this.corrupt=true;this.ct=25+Math.random()*50;}}
if(autoMode){var wfx=0.003+int*0.006,wfy=0.002+int*0.005,wa=1.5+int*14;
var wx=Math.sin(this.hy*wfx+autoPhase)*wa,wy=Math.cos(this.hx*wfy+autoPhase*0.7)*wa*0.5;
this.vx+=(this.hx+wx-this.x)*0.04;this.vy+=(this.hy+wy-this.y)*0.04;
var bdx=this.x-autoWX,bdy=this.y-autoWY,bd=Math.sqrt(bdx*bdx+bdy*bdy),br=120+int*160;
if(bd<br&&int>0.15){var f2=(1-bd/br)*int*6,a2=Math.atan2(bdy,bdx)+(Math.random()-0.5)*1.5;this.vx+=Math.cos(a2)*f2;this.vy+=Math.sin(a2)*f2;if(Math.random()<0.25){this.corrupt=true;this.ct=12+Math.random()*35;}}}
if(musicPlaying){
var mWave=Math.sin(this.hy*0.005+fr*0.03*musicMid)*musicBass*20*D.wave;
var mPulse=Math.cos(this.hx*0.004+fr*0.02)*musicHigh*12*D.pulse;
this.vx+=(mWave+(Math.random()-0.5)*musicEnergy*8*D.scatter)*0.5;
this.vy+=(mPulse+(Math.random()-0.5)*musicEnergy*6*D.scatter)*0.5;
if(musicBeat){
var bAngle=Math.atan2(this.y-H/2,this.x-W/2)+Math.random()*0.5;
var bForce=musicBass*35*D.beatpow;
this.vx+=Math.cos(bAngle)*bForce;
this.vy+=Math.sin(bAngle)*bForce;
this.corrupt=true;
this.ct=(20+Math.random()*40)*D.corrupt;
}
if(musicBass>0.4&&Math.random()<0.15*D.corrupt){this.corrupt=true;this.ct=(15+Math.random()*30)*D.corrupt;}
}
var sp=this.corrupt?0.012*D.spring:0.08*D.spring;this.vx+=(this.hx-this.x)*sp;this.vy+=(this.hy-this.y)*sp;this.vx*=0.88;this.vy*=0.88;
if(this.corrupt){this.vx+=(Math.random()-0.5)*int*2.5;this.vy+=(Math.random()-0.5)*int*1.8;this.ct--;if(this.ct<=0)this.corrupt=false;}
if(int>0.1){this.vx+=(Math.random()-0.5)*int*0.8;this.vy+=(Math.random()-0.5)*int*0.6;}
this.x+=this.vx;this.y+=this.vy;
this.r=BR+Math.sin(fr*this.bs+this.ph)*0.3;if(this.corrupt)this.r=BR+Math.random()*int*3;if(int>0.5&&Math.random()<0.012)this.r=0.4;
if(musicPlaying){this.r+=(musicBass*3+musicEnergy*1.5)*D.size;}
if(this.dead){this.x=this.hx+this.stuck;this.y=this.hy+this.stuck;}
};
Dot.prototype.draw=function(ctx,int){
var r=this.b,g=this.b,bl=this.b;
if(this.dead){if(Math.random()<0.7){r=255;g=255;bl=255;}else{r=0;g=0;bl=0;}}
else if(this.corrupt){var cv=Math.min(255,this.b+100*int*D.bright*(0.5+Math.random()));r=cv;g=cv;bl=cv;}
if(musicPlaying&&!this.dead){ var mb=(musicBass*200+musicMid*150+musicHigh*180)/3*D.bright; var mv=Math.min(255,r+mb); r=mv;g=mv;bl=mv; if(musicBeat){var fl=100*D.flash;r=Math.min(255,r+fl);g=Math.min(255,g+fl);bl=Math.min(255,bl+fl);} }
}
if(((this.y/6)|0)%2===0&&int>0.2){r*=0.75;g*=0.75;bl*=0.75;}
if(int>0.4){var s=Math.max(2,(28*int)|0);r=((r/s)|0)*s;g=((g/s)|0)*s;bl=((bl/s)|0)*s;}
ctx.fillStyle='rgb('+(r|0)+','+(g|0)+','+(bl|0)+')';
if(this.corrupt&&Math.random()<0.2){ctx.beginPath();ctx.ellipse(this.x,this.y,this.r+Math.random()*int*6,Math.max(0.1,this.r*0.4),Math.random()*Math.PI,0,TP);ctx.fill();}
else{ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,TP);ctx.fill();}
};

function calcFontSize(text){
var len=text.length||1;
if(len<=1)return Math.min(W*0.7,H*0.8);
var maxW=W*0.88,maxH=H*0.8;
var charsPerLine,lines,fs;
if(len<=12){charsPerLine=len;lines=1;}
else if(len<=24){charsPerLine=Math.ceil(len/2);lines=2;}
else{charsPerLine=Math.ceil(len/3);lines=3;}
var fsW=maxW/(charsPerLine*0.62);
var fsH=maxH/(lines*1.2);
fs=Math.min(fsW,fsH,H*0.5);
return Math.max(24,Math.floor(fs));
}

function sampleText(){
var old=particles;particles=[];
var text=currentText;if(!text)text=' ';
var fs=calcFontSize(text);
offX.clearRect(0,0,W,H);offX.fillStyle='#fff';
offX.font='bold '+fs+'px '+curFont;offX.textAlign='center';offX.textBaseline='middle';
var len=text.length,lines=[],charsPerLine;
if(len<=12){lines=[text];}
else if(len<=24){var mid=Math.ceil(len/2);lines=[text.slice(0,mid),text.slice(mid)];}
else{var third=Math.ceil(len/3);lines=[text.slice(0,third),text.slice(third,third*2),text.slice(third*2)];}
var lineH=fs*1.15;
var totalH=lines.length*lineH;
var startY=H/2-totalH/2+lineH/2;
var renderLines=[];
for(var li=0;li<lines.length;li++){
var line=lines[li];
if(intensity>0.5&&Math.random()<0.2){
var pos=(Math.random()*line.length)|0;
var glitchChars='@#$%&*!?/\\|><~^';
line=line.slice(0,pos)+glitchChars[(Math.random()*glitchChars.length)|0]+line.slice(pos+1);
}
renderLines.push(line);
}
for(var li=0;li<renderLines.length;li++){
offX.fillText(renderLines[li],W/2,startY+li*lineH);
}
cursorTimer=frame;
var data=offX.getImageData(0,0,W,H).data;
var gap=Math.max(3,Math.round(BR*2+(text.length>20?1:0)));
for(var y=0;y<H;y+=gap){for(var x=0;x<W;x+=gap){
var i=(y*W+x)*4;if(data[i+3]>30){var b=data[i]*(data[i+3]/255);var dot=new Dot(x,y,b);
if(old.length>0){var best=null,bestD=1e9;for(var s=0;s<6;s++){var op=old[(Math.random()*old.length)|0];var d=(op.hx-x)*(op.hx-x)+(op.hy-y)*(op.hy-y);if(d<bestD){bestD=d;best=op;}}
if(best&&bestD<600){dot.x=best.x;dot.y=best.y;dot.vx=best.vx*0.4;dot.vy=best.vy*0.4;dot.corrupt=best.corrupt;dot.ct=best.ct;}}
particles.push(dot);}}}
}

function drawStatic(){var img=stX.createImageData(W,H),d=img.data,lv=12+intensity*200;
if(musicPlaying)lv+=musicEnergy*250*D.noise;
for(var i=0;i<d.length;i+=8){var v=Math.random()*lv;d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=255;d[i+4]=v;d[i+5]=v;d[i+6]=v;d[i+7]=255;}
stX.putImageData(img,0,0);stC.style.opacity=''+(0.02+intensity*0.12+(musicPlaying?musicEnergy*0.15*D.noise:0));}

function drawBg(){bgX.fillStyle='rgba(10,10,10,'+(0.2+(1-intensity)*0.4)+')';bgX.fillRect(0,0,W,H);
var effectInt=intensity;
if(musicPlaying)effectInt=Math.max(effectInt,musicEnergy*2.0);
if(effectInt<0.03)return;
var n=(effectInt*18)|0,cols=['255,255,255','200,200,200','160,160,160','255,255,255'];
if(musicPlaying){cols=['255,255,255','220,220,220','180,180,180','255,255,255'];}
for(var i=0;i<n;i++){bgX.fillStyle='rgba('+cols[i%4]+','+effectInt*0.07+')';bgX.fillRect((Math.random()-0.5)*effectInt*100,Math.random()*H,W,1+Math.random()*effectInt*35);}
if(effectInt>0.5){var bl=((effectInt-0.5)*10)|0;for(var i=0;i<bl;i++){bgX.fillStyle='rgba('+((Math.random()*50|0))+','+((Math.random()*50|0))+','+((Math.random()*50|0))+','+(0.3+Math.random()*0.4)+')';bgX.fillRect(Math.random()*W,Math.random()*H,2+Math.random()*50*effectInt,2+Math.random()*6);}}}

function rowDisplace(){
var effectInt=intensity;
if(musicPlaying)effectInt=Math.max(effectInt,musicBass*1.2*D.row);
if(effectInt<0.15)return;var n=(effectInt*6)|0;
if(musicBeat)n+=Math.floor(10*D.row);
for(var i=0;i<n;i++){var y=(Math.random()*H)|0,h=Math.min((1+Math.random()*12*effectInt)|0,H-y),s=((Math.random()-0.5)*effectInt*50)|0;
if(h>0&&Math.abs(s)>0){try{var sl=dotX.getImageData(0,y,W,h);dotX.putImageData(sl,s,y);}catch(e){}}}}

function updateAutoMode(){autoPhase+=0.02+intensity*0.04;autoBT--;
if(autoBT<=0){autoWX=W*0.15+Math.random()*W*0.7;autoWY=H*0.15+Math.random()*H*0.7;autoBT=50+Math.random()*100;autoIT=0.15+Math.random()*0.6;}
var w=Math.sin(autoPhase*0.3)*0.12+Math.sin(autoPhase*0.7)*0.08;targetInt=Math.max(0.03,Math.min(1,autoIT+w));
if(Math.random()<0.006){autoIT=0.6+Math.random()*0.3;setTimeout(function(){autoIT=0.08+Math.random()*0.25;},200+Math.random()*400);}
if(intensity>0.45&&Math.random()<0.025){serifW+=(Math.random()-0.5)*0.4;serifW=Math.max(0,Math.min(1,serifW));var p=Math.random()<serifW?FSERIF:FSANS;curFont=p[(Math.random()*p.length)|0];sampleText();}}

function drawCursor(){
if(currentText.length>=MAX_CHARS)return;
var blink=Math.floor(frame/30)%2===0;
if(!blink)return;
var text=currentText||' ';
var fs=calcFontSize(text+'_');
dotX.fillStyle='rgba(255,255,255,'+(0.4+intensity*0.3)+')';
var len=text.length,charsPerLine;
if(len<=12)charsPerLine=len;else if(len<=24)charsPerLine=Math.ceil(len/2);else charsPerLine=Math.ceil(len/3);
var lines=Math.ceil(len/Math.max(1,charsPerLine));
var lastLineChars=len-(lines-1)*charsPerLine;
var lineH=fs*1.15;
var totalH=lines*lineH;
var cy=H/2-totalH/2+lineH*(lines-0.5);
var charW=fs*0.62;
var lineW=lastLineChars*charW;
var cx=W/2+lineW/2+2;
dotX.fillRect(cx,cy-fs*0.35,Math.max(2,fs*0.05),fs*0.7);
}

function animate(){frame++;
analyzeMusicData();
if(musicPlaying){
var musicInt=(musicEnergy*2.5+musicBass*1.0)*D.bright;
targetInt=Math.max(targetInt,Math.min(1,musicInt));
if(musicBeat&&Math.random()<0.8*D.glitch){
serifW+=(Math.random()-0.5)*1.0;
serifW=Math.max(0,Math.min(1,serifW));
var p=Math.random()<serifW?FSERIF:FSANS;
curFont=p[(Math.random()*p.length)|0];
sampleText();
}
}
if(autoMode)updateAutoMode();
else if(!musicPlaying){targetInt=isDown?Math.min(1,targetInt+0.05):Math.max(0,targetInt-0.012);}
else{targetInt=Math.max(0,targetInt-0.015);}
intensity+=(targetInt-intensity)*0.1;
if(!autoMode&&!isDown&&!musicPlaying&&Math.random()<0.003){targetInt=0.08+Math.random()*0.2;setTimeout(function(){if(!isDown&&!autoMode&&!musicPlaying)targetInt=0;},30+Math.random()*150);}
if(!autoMode&&!musicPlaying&&(frame%150===0||(intensity>0.3&&frame%40===0))){serifW+=(Math.random()-0.5)*0.25*Math.max(0.2,intensity);serifW=Math.max(0,Math.min(1,serifW));
var p=Math.random()<serifW?FSERIF:FSANS,nf=p[(Math.random()*p.length)|0];if(nf!==curFont||intensity>0.45){curFont=nf;sampleText();}}
dotX.fillStyle='rgba(10,10,10,'+(intensity>0.1?0.38:1)+')';dotX.fillRect(0,0,W,H);
for(var i=0;i<particles.length;i++){particles[i].update(intensity,frame);particles[i].draw(dotX,intensity);}
drawCursor();
rowDisplace();
if(intensity>0.3&&Math.random()<intensity*0.25){var sy=(Math.random()*H)|0,dy=sy+(((Math.random()-0.5)*35*intensity)|0);
if(dy>0&&dy<H-2){try{var rr=dotX.getImageData(0,sy,W,2);dotX.putImageData(rr,0,dy);}catch(e){}}}
drawBg();if(frame%3===0)drawStatic();
if(intensity>0.7&&Math.random()<0.03*D.flash){dotX.fillStyle='rgba(255,255,255,'+(0.02+Math.random()*0.05)*D.flash+')';dotX.fillRect(0,0,W,H);}
updateSound(intensity);requestAnimationFrame(animate);}

function resize(){W=innerWidth;H=innerHeight;bgC.width=W;bgC.height=H;dotC.width=W;dotC.height=H;stC.width=W;stC.height=H;offC.width=W;offC.height=H;sampleText();}
function pD(e){if(autoMode)return;isDown=true;var t=e.touches?e.touches[0]:e;mx=t.clientX;my=t.clientY;}
function pM(e){if(autoMode)return;var t=e.touches?e.touches[0]:e;mx=t.clientX;my=t.clientY;}
function pU(){isDown=false;}
addEventListener('mousedown',pD);addEventListener('mousemove',pM);addEventListener('mouseup',pU);
addEventListener('touchstart',pD,{passive:true});addEventListener('touchmove',pM,{passive:true});addEventListener('touchend',pU);
addEventListener('resize',resize);
resize();animate();updateCounter();
</script>
</body>
</html>
